{% extends "base.html" %}

{% set show_navbar = False %}

{% block content %}
<div class="login-wrapper">
  <div class="login-container">
    <!-- Logo e Título -->
    <div class="login-header">
      <h1>VIP CHECKLIST</h1>
      <p>Gestão Inteligente de Frotas</p>
    </div>
    
    <!-- Card de Login -->
    <div class="login-card">
      <div class="login-title">
        <h2>Bem-vindo de volta</h2>
        <p>Faça login para acessar o sistema</p>
      </div>
      
      <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
        
        <!-- Username -->
        <div class="form-group">
          <label for="username" class="form-label">
            <i class="bi bi-person"></i> Usuário
          </label>
          <input type="text" class="form-control" id="username" name="username" 
                 required autofocus placeholder="Digite seu usuário">
        </div>
        
        <!-- Password -->
        <div class="form-group">
          <label for="password" class="form-label">
            <i class="bi bi-lock"></i> Senha
          </label>
          <div class="password-input-group">
            <input type="password" class="form-control" id="password" name="password" 
                   required placeholder="Digite sua senha">
            <button class="toggle-password" type="button" id="togglePassword">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        
        <!-- Submit Button -->
        <button type="submit" class="login-button">
          <i class="bi bi-box-arrow-in-right"></i> Entrar no Sistema
        </button>
      </form>
      
      <!-- Security Info -->
      <div class="login-footer">
        <p>
          <i class="bi bi-shield-check"></i>
          Acesso seguro e criptografado
        </p>
      </div>
    </div>
    
    <!-- Copyright -->
    <div class="login-copyright">
      <p>© {{ current_year }} Checklist Veicular • Versão 1.0</p>
    </div>
  </div>
</div>

<style>
  /* Reset e Base */
  body {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    min-height: 100vh;
    margin: 0;
    padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    color: #e2e8f0;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at 20% 80%, rgba(34, 197, 94, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(34, 197, 94, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(34, 197, 94, 0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: -1;
  }

  /* Limpeza para página de login */
  .sidebar-vertical {
    display: none !important;
  }

  .d-flex {
    display: flex !important;
    height: 100vh !important;
    padding: 0 !important;
    margin: 0 !important;
    width: 100% !important;
  }

  .main-content {
    height: 100vh !important;
    padding: 0 !important;
    margin: 0 !important;
    display: flex !important;
    flex-direction: column !important;
    flex: 1 !important;
    width: 100% !important;
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
  }

  .container.mt-4 {
    display: none !important;
  }

  .container {
    max-width: none !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  main.container {
    display: flex !important;
    flex: 1 !important;
    padding: 0 !important;
    margin: 0 !important;
    height: 100vh !important;
    align-items: center !important;
    justify-content: center !important;
  }

  .footer {
    display: none !important;
  }

  .login-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    width: 100%;
    padding: 1rem;
    box-sizing: border-box;
    flex: 1;
  }

  .login-container {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  /* Header */
  .login-header {
    text-align: center;
    color: white;
    margin-bottom: 1rem;
  }

  .login-header h1 {
    font-size: 2rem;
    font-weight: 700;
    margin: 0;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    letter-spacing: 0.5px;
  }

  .login-header p {
    font-size: 1rem;
    margin: 0.5rem 0 0 0;
    opacity: 0.95;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
  }

  /* Card */
  .login-card {
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 2.5rem;
    box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(34, 197, 94, 0.1);
    width: 100%;
    border: 1px solid rgba(34, 197, 94, 0.2);
    position: relative;
    overflow: hidden;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #22c55e, #16a34a, #22c55e);
    background-size: 200% 100%;
    animation: gradientShift 3s ease-in-out infinite;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .login-title {
    text-align: center;
    margin-bottom: 2rem;
  }

  .login-title h2 {
    font-size: 1.4rem;
    font-weight: 600;
    margin: 0;
    color: #e2e8f0;
  }

  .login-title p {
    font-size: 0.9rem;
    color: #94a3b8;
    margin: 0.5rem 0 0 0;
  }

  /* Form */
  .form-group {
    margin-bottom: 1.5rem;
  }

  .form-label {
    display: block;
    font-size: 0.9rem;
    font-weight: 600;
    color: #e2e8f0;
    margin-bottom: 0.5rem;
  }

  .form-label i {
    margin-right: 0.5rem;
    color: #22c55e;
    filter: drop-shadow(0 0 8px rgba(34, 197, 94, 0.3));
  }

  .form-control {
    width: 100%;
    padding: 0.875rem 1rem;
    font-size: 1rem;
    border: 2px solid rgba(34, 197, 94, 0.2);
    border-radius: 16px;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(10px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-sizing: border-box;
    font-weight: 500;
    color: #ffffff;
  }

  .form-control:focus {
    outline: none;
    background: rgba(15, 23, 42, 0.8);
    border-color: #22c55e;
    box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.15), 0 8px 25px rgba(0, 0, 0, 0.1);
    transform: translateY(-1px);
  }

  .form-control::placeholder {
    color: #94a3b8;
  }

  .form-control:-webkit-autofill,
  .form-control:-webkit-autofill:hover,
  .form-control:-webkit-autofill:focus,
  .form-control:-webkit-autofill:active {
    -webkit-text-fill-color: #ffffff;
    box-shadow: 0 0 0px 1000px rgba(15, 23, 42, 0.8) inset;
    caret-color: #ffffff;
  }

  .password-input-group {
    position: relative;
    display: flex;
    align-items: center;
  }

  .password-input-group .form-control {
    flex: 1;
  }

  .toggle-password {
    position: absolute;
    right: 1rem;
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    padding: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    transition: color 0.3s ease;
  }

  .toggle-password:hover {
    color: #22c55e;
  }

  /* Button */
  .login-button {
    width: 100%;
    padding: 1rem 1.5rem;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    color: white;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
  }

  .login-button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.5s;
  }

  .login-button:hover::before {
    left: 100%;
  }

  .login-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(34, 197, 94, 0.4);
  }

  .login-button:active {
    transform: translateY(0);
  }

  /* Footer */
  .login-footer {
    text-align: center;
    padding-top: 1.5rem;
    border-top: 1px solid rgba(34, 197, 94, 0.2);
    margin-top: 1.5rem;
  }

  .login-footer p {
    font-size: 0.85rem;
    color: #94a3b8;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  /* Copyright */
  .login-copyright {
    text-align: center;
    color: rgba(255, 255, 255, 0.8);
    font-size: 0.85rem;
  }

  .login-copyright p {
    margin: 0;
  }

  /* Responsivo - Celular Pequeno (≤375px) */
  @media (max-width: 375px) {
    .login-wrapper {
      padding: 0.75rem;
    }

    .login-container {
      gap: 1.5rem;
    }

    .login-header h1 {
      font-size: 1.5rem;
    }

    .login-header p {
      font-size: 0.9rem;
    }

    .login-card {
      padding: 1.25rem;
      border-radius: 16px;
    }

    .login-title h2 {
      font-size: 1.1rem;
    }

    .login-title p {
      font-size: 0.8rem;
    }

    .form-control {
      padding: 0.7rem 0.75rem;
      font-size: 16px;
      height: 44px;
    }

    .login-button {
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      height: 44px;
    }
  }

  /* Responsivo - Celular (376px - 576px) */
  @media (min-width: 376px) and (max-width: 576px) {
    .login-wrapper {
      padding: 1rem;
    }

    .login-container {
      gap: 1.75rem;
    }

    .login-header h1 {
      font-size: 1.75rem;
    }

    .login-header p {
      font-size: 0.95rem;
    }

    .login-card {
      padding: 1.75rem;
      border-radius: 18px;
    }

    .login-title h2 {
      font-size: 1.2rem;
    }

    .login-title p {
      font-size: 0.85rem;
    }

    .form-control {
      padding: 0.7rem 0.85rem;
      font-size: 16px;
      height: 44px;
    }

    .login-button {
      padding: 0.75rem 1.25rem;
      font-size: 0.95rem;
      height: 44px;
    }
  }

  /* Responsivo - Tablet (577px - 768px) */
  @media (min-width: 577px) and (max-width: 768px) {
    .login-container {
      max-width: 480px;
    }

    .login-card {
      border-radius: 20px;
    }
  }

  /* Responsivo - Desktop (769px+) */
  @media (min-width: 769px) {
    .login-wrapper {
      padding: 2rem;
    }

    .login-container {
      gap: 2.5rem;
    }
  }

  /* Touch targets (mobile) */
  @media (hover: none) and (pointer: coarse) {
    button,
    .toggle-password {
      min-height: 44px;
      min-width: 44px;
    }
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');
  
  if (togglePassword && passwordInput) {
    togglePassword.addEventListener('click', function(e) {
      e.preventDefault();
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      const icon = this.querySelector('i');
      if (icon) {
        icon.classList.toggle('bi-eye');
        icon.classList.toggle('bi-eye-slash');
      }
    });
  }
});
</script>
{% endblock %}
