{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header bg-white">
        <h5 class="card-title mb-0">Editar Usuário: <strong>{{ user.username }}</strong></h5>
      </div>
      <div class="card-body">
        <form method="POST" action="{{ url_for('auth.edit_user', user_id=user.id) }}">
          <div class="mb-3">
            <label for="username" class="form-label">Nome de Usuário</label>
            <input type="text" class="form-control" id="username" name="username" 
                   value="{{ user.username }}" required>
          </div>
          
          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" name="email" 
                   value="{{ user.email or '' }}" placeholder="seu@email.com">
          </div>

          <div class="mb-3">
            <label class="form-label">Nível de Acesso</label>
            <div class="alert alert-info">
              <strong>{{ 'Admin' if user.role == 'admin' else 'Usuário Normal' }}</strong>
              <p class="mb-0 mt-2 small">Para alterar o nível de acesso, volte à página de gerenciamento de usuários.</p>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center gap-2">
            <a href="{{ url_for('auth.manage_users') }}" class="btn btn-outline-secondary">
              <i class="bi bi-arrow-left"></i> Voltar
            </a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-save"></i> Salvar Alterações
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
