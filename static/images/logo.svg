<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="44" height="44">
  <defs>
    <linearGradient id="carGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Car body -->
  <path d="M 20 55 L 25 40 L 35 35 L 65 35 L 75 40 L 80 55 Z" fill="url(#carGradient)" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
  
  <!-- Car windows -->
  <rect x="28" y="38" width="12" height="10" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="60" y="38" width="12" height="10" rx="1" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Car wheels -->
  <circle cx="30" cy="57" r="5" fill="white" stroke="url(#carGradient)" stroke-width="1.5"/>
  <circle cx="70" cy="57" r="5" fill="white" stroke="url(#carGradient)" stroke-width="1.5"/>
  
  <!-- Checklist icon -->
  <g transform="translate(50, 20)">
    <rect x="-8" y="-8" width="16" height="18" rx="2" fill="white" stroke="url(#carGradient)" stroke-width="1.5"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="url(#carGradient)" stroke-width="1"/>
    <!-- Checkmarks -->
    <polyline points="-6,4 -2,8 4,2" fill="none" stroke="url(#carGradient)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>